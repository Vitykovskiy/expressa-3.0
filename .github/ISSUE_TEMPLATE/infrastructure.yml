name: Infrastructure
description: "Stage 0 — set up CI/CD, VPS, secrets, and environment variables before implementation begins."
title: "[Infrastructure] "
labels:
  - "task_type: infrastructure"
  - "contour: devops"
body:
  - type: markdown
    attributes:
      value: |
        Stage 0 infrastructure task. Must be completed before any implementation task starts.
        The `task_type` is fixed as `infrastructure`, contour as `devops`.
  - type: dropdown
    id: model
    attributes:
      label: model
      description: "Agent model for this task. from-config uses the value from .ai-dev-template.config.json"
      options:
        - from-config
        - claude
        - codex
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: infrastructure_change
    attributes:
      label: infrastructure_change
      description: What infrastructure change does this task perform?
      placeholder: Describe CI/CD setup, VPS preparation, or environment wiring.
    validations:
      required: true
  - type: textarea
    id: env_vars_and_secrets
    attributes:
      label: env_vars_and_secrets
      description: List all environment variables and secrets this task must provision.
      placeholder: "DATABASE_URL → VPS env; API_KEY → GitHub Secrets"
    validations:
      required: true
  - type: textarea
    id: target_environment
    attributes:
      label: target_environment
      description: Which environment does this task target?
      placeholder: staging / production
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      placeholder: docs/04-tech-stack.md, docs/09-integrations.md, VPS access credentials
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      description: All items must be checked before the task moves to Ready.
      value: |
        - [ ] infrastructure_change is described
        - [ ] env_vars_and_secrets list is complete
        - [ ] target_environment is specified (staging / production)
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      description: All items must be checked before the task can be closed.
      value: |
        - [ ] CI/CD pipeline runs successfully on push
        - [ ] VPS is accessible and configured
        - [ ] all secrets are in GitHub Secrets
        - [ ] all environment variables are set in target environment
        - [ ] autodeploy to VPS triggers from the main branch
        - [ ] evidence committed and pushed
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: priority
      description: "high = blocks other tasks; medium = independent task; low = improvement not blocking progress"
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
