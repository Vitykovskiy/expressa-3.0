name: Business Analysis
description: Create the intake task that clarifies the business problem and workflow vocabulary.
title: "[Business Analysis] "
labels:
  - "task_type: business_analysis"
body:
  - type: markdown
    attributes:
      value: |
        This template is for the single business-analysis issue that starts one delivery stream.
        The `task_type` is fixed by this template as `business_analysis`.
  - type: dropdown
    id: owner_contour
    attributes:
      label: owner_contour
      options:
        - business-analyst
    validations:
      required: true
  - type: input
    id: parent_initiative
    attributes:
      label: parent_initiative
      description: Link the initiative issue number or URL.
      placeholder: "#123"
    validations:
      required: true
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What business problem, user need, or request triggered this task?
      placeholder: Describe the problem and who is affected.
    validations:
      required: true
  - type: textarea
    id: canonical_inputs
    attributes:
      label: canonical_inputs
      description: List source requests, docs, and prerequisite artifacts.
      placeholder: docs/01-product-vision.md, stakeholder notes, linked requests
    validations:
      required: true
  - type: textarea
    id: depends_on
    attributes:
      label: depends_on
      description: List blocking tasks explicitly or write `none`.
      placeholder: none
    validations:
      required: true
  - type: textarea
    id: definition_of_ready
    attributes:
      label: definition_of_ready
      placeholder: Initiative exists; request and expected business outcome are identifiable.
    validations:
      required: true
  - type: textarea
    id: definition_of_done
    attributes:
      label: definition_of_done
      placeholder: Users, scenarios, scope, constraints, and success expectations are documented; one downstream system_analysis task is ready.
    validations:
      required: true
  - type: dropdown
    id: project_status
    attributes:
      label: project_status
      options:
        - Inbox
        - Ready
        - In Progress
        - Blocked
        - Waiting for Testing
        - Testing
        - Waiting for Fix
        - In Review
        - Done
    validations:
      required: true
